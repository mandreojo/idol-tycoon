<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>아이돌 육성 타이쿤</title>
<style>
  :root{
    --bg:#fff2f4; --panel:#ffffff; --panel2:#fff5f7; --line:#ffdbe1;
    --txt:#2b2530; --sub:#9a8f9a; --accent:#ec3a5c; --accent2:#ff7a9c;
    --gold:#f0a01e; --good:#18b06e; --bad:#ef4452;
    --vocal:#ff4f97; --dance:#2f9fe6; --visual:#f5a516; --charm:#9160f5;
    --acting:#ff6a3d; --creative:#12bda0; --mental:#8a92ad;
  }
  @font-face{font-family:'Jua';src:url('assets/Jua-400.ttf') format('truetype');font-display:swap}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0;background:#f3e6e9;color:var(--txt);
    font-family:'Jua',-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Pretendard",sans-serif}
  #app{max-width:480px;margin:0 auto;min-height:100vh;background:
    radial-gradient(120% 55% at 50% -8%, #ffe2e8 0%, var(--bg) 52%);
    display:flex;flex-direction:column;position:relative;overflow:hidden}
  .screen{flex:1;display:none;flex-direction:column;padding:16px}
  .screen.on{display:flex}
  #s-title{background:radial-gradient(120% 48% at 50% 14%, #ffdde4 0%, var(--bg) 62%)}
  #logo{width:230px;max-width:70%;height:auto;margin:0 auto;display:block}
  #titleMascot{width:132px;height:132px;border-radius:50%;object-fit:cover;object-position:top center;
    margin:0 auto;display:block;border:4px solid #fff;box-shadow:0 10px 22px rgba(236,58,92,.22)}
  h1{font-size:26px;margin:0;line-height:1.15;letter-spacing:-.5px}
  h2{font-size:19px;margin:0 0 6px}
  .muted{color:var(--sub);font-size:13px;line-height:1.5}
  .btn{appearance:none;border:none;border-radius:14px;padding:15px 16px;
    font-size:16px;font-weight:700;color:#fff;background:linear-gradient(135deg,var(--accent),var(--accent2));
    width:100%;cursor:pointer;transition:transform .08s;box-shadow:0 6px 18px -6px var(--accent2)}
  .btn:active{transform:scale(.97)}
  .btn.ghost{background:var(--panel2);box-shadow:none;color:var(--txt);border:1px solid var(--line)}
  .btn:disabled{opacity:.4}

  /* SELECT */
  .segtab{display:flex;gap:8px;margin-bottom:12px}
  .seg{flex:1;appearance:none;border:1px solid var(--line);border-radius:12px;padding:11px 8px;
    background:var(--panel);color:var(--sub);font-size:14px;font-weight:700;cursor:pointer;transition:.1s}
  .seg.on{background:var(--panel2);color:var(--txt);border-color:var(--accent)}
  .modebox{flex:1;display:flex;flex-direction:column;min-height:0;padding-bottom:78px}
  /* 플로팅 시작 버튼 */
  .startfab{position:fixed;left:50%;bottom:16px;transform:translateX(-50%);
    width:calc(100% - 32px);max-width:448px;z-index:26;
    box-shadow:0 10px 26px -6px rgba(236,58,92,.6);
    transition:transform .28s cubic-bezier(.2,.9,.3,1.3),opacity .2s}
  .startfab.hide{opacity:0;transform:translateX(-50%) translateY(24px);pointer-events:none}
  .srch{width:100%;background:var(--panel2);border:1px solid var(--line);border-radius:12px;
    color:var(--txt);padding:12px 14px;font-size:15px;margin-bottom:10px;-webkit-appearance:none}
  .srch:focus{outline:none;border-color:var(--accent)}
  .uploader{display:flex;align-items:center;justify-content:center;height:160px;border-radius:16px;
    border:2px dashed var(--line);background:var(--panel) center/cover no-repeat;color:var(--sub);
    cursor:pointer;margin-bottom:12px;text-align:center;overflow:hidden;font-size:32px}
  .uploader small{font-size:12px;font-weight:600}
  .specpick{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;padding-bottom:4px}
  .sp{appearance:none;border:1px solid var(--line);border-radius:12px;padding:11px 4px;
    background:var(--panel);color:var(--txt);font-size:13px;font-weight:700;cursor:pointer;transition:.1s}
  .sp.on{border-color:var(--accent);box-shadow:0 0 0 2px var(--accent) inset}
  .sp .spico{font-size:20px;display:block;margin-bottom:3px}
  #s-select .grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;overflow-y:auto;padding:4px 0 12px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:16px;overflow:hidden;
    cursor:pointer;transition:transform .1s,border-color .1s;position:relative}
  .card:active{transform:scale(.97)}
  .card.sel{border-color:var(--accent);box-shadow:0 0 0 2px var(--accent) inset}
  .card .ph{width:100%;aspect-ratio:1;background:#ffe0e6 center/cover no-repeat;display:block}
  .card .nm{padding:8px 10px 4px;font-weight:700;font-size:14px;line-height:1.2}
  .card .gp{padding:0 10px 10px;color:var(--sub);font-size:11px}
  .card .tag{position:absolute;top:8px;left:8px;background:rgba(0,0,0,.55);backdrop-filter:blur(4px);
    font-size:10px;padding:3px 7px;border-radius:20px;font-weight:700}

  /* PLAY header */
  .top{display:flex;align-items:center;gap:12px;margin-bottom:12px}
  .avatar{width:76px;height:76px;border-radius:18px;background:#ffe0e6 center/cover no-repeat;
    flex:none;border:2.5px solid var(--accent);display:flex;align-items:center;justify-content:center;font-size:38px;
    box-shadow:0 6px 16px rgba(236,58,92,.22)}
  .top .meta{flex:1;min-width:0}
  .top .nm{font-weight:800;font-size:17px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .chip{display:inline-block;font-size:11px;padding:2px 8px;border-radius:20px;background:var(--panel2);
    color:var(--sub);margin-top:3px}
  .fans{text-align:right;flex:none}
  .fans b{font-size:19px;color:var(--gold);display:block}
  .fans span{font-size:10px;color:var(--sub)}

  .actbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
  .week{font-weight:800;font-size:15px}
  .actbanner{font-size:12px;font-weight:700;padding:4px 10px;border-radius:20px;
    background:linear-gradient(135deg,var(--accent2),var(--accent))}

  .cond{margin-bottom:10px}
  .barlbl{display:flex;justify-content:space-between;font-size:12px;color:var(--sub);margin-bottom:4px}
  .barlbl b{color:var(--txt)}
  .bar{height:9px;background:var(--panel2);border-radius:20px;overflow:hidden}
  .bar > i{display:block;height:100%;border-radius:20px;transition:width .4s}

  .stats{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:8px 12px;margin-bottom:10px}
  .stats,.act,.card,.ev-card,.lb,.uploader,.seg,.btn.ghost{box-shadow:0 4px 14px rgba(236,58,92,.08)}
  .stat{display:flex;align-items:center;gap:8px;margin:6px 0}
  .stat .k{width:64px;font-size:12px;font-weight:700;color:var(--sub);white-space:nowrap}
  .stat .bar{flex:1}
  .stat .v{width:26px;text-align:right;font-weight:800;font-size:13px;font-variant-numeric:tabular-nums}
  .gbadge{width:30px;text-align:center;font-size:11px;font-weight:900;color:#0e0b1a;
    border-radius:7px;padding:2px 0;letter-spacing:-.5px}

  /* 연습실 패널 (빈 공간 채움 + 다음 관문 안내) */
  .practice{display:flex;align-items:center;gap:14px;margin:14px 0 0;padding:12px 16px;
    background:var(--panel);border:1px solid var(--line);border-radius:16px;box-shadow:0 4px 14px rgba(236,58,92,.08)}
  .pr-buddy{width:60px;height:60px;object-fit:cover;border-radius:14px;flex:none;
    box-shadow:0 3px 10px rgba(236,58,92,.18);animation:prBob 1.5s ease-in-out infinite}
  @keyframes prBob{0%,100%{transform:translateY(0) scaleY(1)}50%{transform:translateY(-6px) scaleY(1.04)}}
  .pr-info{flex:1;min-width:0}
  .pr-label{font-size:11px;color:var(--sub);font-weight:700}
  .pr-next{font-size:15px;font-weight:800;margin:2px 0 8px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .pr-track{height:8px;background:var(--panel2);border-radius:20px;overflow:hidden}
  .pr-track>i{display:block;height:100%;border-radius:20px;transition:width .5s;
    background:linear-gradient(90deg,var(--accent2),var(--accent))}
  .actions{margin-top:auto}
  .act .d{margin-left:5px}
  .agrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
  .act{display:flex;align-items:center;gap:9px;background:var(--panel);border:1px solid var(--line);
    border-radius:13px;padding:11px 12px;cursor:pointer;transition:transform .08s,border-color .1s;text-align:left;width:100%}
  .act:active{transform:scale(.97)}
  .act.rest{background:var(--panel2)}
  .act .ico{font-size:20px;width:22px;text-align:center;flex:none}
  .act .body{flex:1;min-width:0}
  .act .t{font-weight:700;font-size:14px}
  .act .d{font-size:10px;color:var(--sub);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

  /* overlay */
  .ov{position:absolute;inset:0;background:rgba(255,240,243,.9);backdrop-filter:blur(6px);
    display:none;flex-direction:column;justify-content:center;align-items:center;padding:26px;z-index:20;text-align:center}
  .ov.on{display:flex}
  .roll{font-size:52px;font-weight:900;letter-spacing:-2px;margin-bottom:4px}
  .roll.dc{color:var(--bad)} .roll.f{color:#ff9d5f} .roll.s{color:var(--good)} .roll.dg{color:var(--gold)}
  .delta{font-size:15px;color:var(--sub);line-height:1.7;margin-top:6px}
  .delta b{color:var(--txt)}
  .ev-card{background:var(--panel);border:1px solid var(--line);border-radius:20px;padding:22px 20px;width:100%}
  .ev-emoji{font-size:44px}
  .ev-title{font-size:19px;font-weight:800;margin:8px 0 6px}
  .ev-text{font-size:14px;color:var(--sub);line-height:1.6;margin-bottom:16px}
  .ev-choices{display:grid;gap:9px}

  /* end */
  #s-end{overflow-y:auto}
  .endtitle{font-size:14px;color:var(--sub);font-weight:700}
  .end-idol{text-align:center;margin:8px 0 2px}
  .end-avatar{width:100px;height:100px;border-radius:50%;object-fit:cover;background:#ffe0e6;
    border:3px solid var(--accent);box-shadow:0 8px 22px rgba(236,58,92,.24)}
  .end-idolname{font-weight:800;font-size:18px;margin-top:9px}
  .end-idolname small{color:var(--sub);font-weight:700;font-size:13px;margin-left:4px}
  .rank-emoji{font-size:52px;text-align:center;margin:4px 0 0}
  .endname{font-size:25px;font-weight:900;text-align:center;letter-spacing:-1px;line-height:1.15}
  .endsub{text-align:center;color:var(--sub);font-size:13px;margin-top:6px;line-height:1.6}
  #radarWrap{display:flex;justify-content:center;margin:10px 0 4px}
  #radar{width:290px;height:290px;max-width:88%}
  .ograde{text-align:center;margin-top:2px;font-size:13px;color:var(--sub)}
  .ograde b{font-size:20px;color:var(--gold);vertical-align:-2px;margin-left:4px}
  .lb{background:var(--panel);border:1px solid var(--line);border-radius:16px;overflow:hidden;margin-top:14px}
  .lb-row{display:flex;align-items:center;gap:10px;padding:11px 14px;border-top:1px solid var(--line);font-size:14px}
  .lb-row:first-child{border-top:none}
  .lb-row.me{background:rgba(255,95,162,.14)}
  .lb-row .r{width:22px;font-weight:800;color:var(--sub)}
  .lb-row .who{flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .lb-row .who small{color:var(--sub)}
  .lb-row .sc{font-weight:800;color:var(--gold);font-variant-numeric:tabular-nums}
  input.name{width:100%;background:var(--panel2);border:1px solid var(--line);border-radius:12px;
    color:var(--txt);padding:12px 14px;font-size:16px;margin-top:12px}
  .center{text-align:center}
  .spacer{flex:1}
  .toast{position:absolute;top:14px;left:50%;transform:translateX(-50%);background:var(--panel2);
    border:1px solid var(--line);padding:9px 16px;border-radius:20px;font-size:13px;z-index:30;
    opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;max-width:90%}
  .toast.on{opacity:1}

  /* 페이즈 전환 컷씬 */
  .cutscene{position:fixed;top:0;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;
    z-index:40;display:none;flex-direction:column;
    align-items:center;justify-content:center;text-align:center;padding:30px;overflow:hidden;
    background:linear-gradient(165deg,#3a0f1f 0%,#180610 100%)}
  .cutscene.on{display:flex}
  .cutscene::before{content:"";position:absolute;top:-40%;left:50%;width:200%;height:150%;
    transform:translateX(-50%);pointer-events:none;
    background:conic-gradient(from 0deg at 50% 0%, transparent 0deg, rgba(255,120,150,.16) 22deg, transparent 46deg, rgba(255,140,165,.12) 80deg, transparent 104deg, rgba(255,150,175,.16) 150deg, transparent 180deg);
    animation:spot 9s linear infinite}
  @keyframes spot{to{transform:translateX(-50%) rotate(360deg)}}
  .cs-in{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;
    animation:csIn .55s cubic-bezier(.2,.9,.3,1.3) both}
  @keyframes csIn{from{opacity:0;transform:translateY(28px) scale(.94)}to{opacity:1;transform:none}}
  .cs-act{color:#ff9db3;font-size:14px;letter-spacing:4px;font-weight:800;margin-bottom:8px}
  .cs-emoji{font-size:60px;line-height:1;filter:drop-shadow(0 6px 16px rgba(0,0,0,.4))}
  .cs-title{color:#fff;font-size:33px;font-weight:900;margin:10px 0 4px;letter-spacing:-.5px;
    text-shadow:0 3px 22px rgba(236,58,92,.55)}
  .cs-sub{color:#ffc2d0;font-size:15px;font-weight:700;letter-spacing:1px}
  .cs-talk{display:flex;align-items:flex-end;gap:10px;margin-top:28px;max-width:340px}
  .cs-mascot{width:72px;height:72px;border-radius:50%;object-fit:cover;flex:none;background:#ffe0e6;
    border:3px solid #fff;box-shadow:0 6px 16px rgba(0,0,0,.4);animation:bob 1.7s ease-in-out infinite}
  @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
  .cs-bubble{background:#fff;color:#2b2530;border-radius:16px 16px 16px 4px;padding:12px 15px;
    font-size:14px;font-weight:700;line-height:1.45;text-align:left;box-shadow:0 8px 20px rgba(0,0,0,.28)}
  .cs-tap{position:absolute;bottom:26px;left:0;right:0;color:rgba(255,255,255,.6);font-size:13px;
    z-index:1;animation:blink 1.4s ease-in-out infinite}
  @keyframes blink{0%,100%{opacity:.4}50%{opacity:.9}}

  /* 결과 집계 로딩 */
  .loading{position:fixed;top:0;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;
    z-index:45;display:none;flex-direction:column;
    align-items:center;justify-content:center;text-align:center;
    background:linear-gradient(165deg,#3a0f1f,#180610)}
  .loading.on{display:flex}
  .load-ring{width:66px;height:66px;border-radius:50%;border:6px solid rgba(255,255,255,.15);
    border-top-color:#ff5f8a;animation:spin .8s linear infinite;margin-bottom:22px}
  @keyframes spin{to{transform:rotate(360deg)}}
  .load-txt{color:#fff;font-size:21px;font-weight:900}
  .load-step{color:#ffc2d0;font-size:14px;font-weight:700;margin-top:12px;min-height:20px;animation:blink 1.2s ease-in-out infinite}

  /* 육성 연출: 훈련 씬 · 게이지·등급 강조 */
  .train-scene{display:flex;flex-direction:column;align-items:center;margin-bottom:14px}
  .train-ava{width:104px;height:104px;border-radius:50%;object-fit:cover;background:#ffe0e6;
    border:4px solid var(--accent);box-shadow:0 10px 26px rgba(236,58,92,.28)}
  .train-ico{position:relative;margin-top:-22px;font-size:40px;
    filter:drop-shadow(0 4px 8px rgba(0,0,0,.2));animation:heave .5s ease-in-out infinite}
  @keyframes heave{0%,100%{transform:translateY(0) rotate(-6deg)}50%{transform:translateY(-10px) rotate(6deg)}}
  .train-say{margin-top:8px;font-size:14px;font-weight:800;color:var(--accent)}
  .stat{transition:background .2s;border-radius:9px}
  .stat.bump{background:rgba(236,58,92,.10);animation:statPulse .7s ease-out}
  @keyframes statPulse{0%{transform:scale(1)}30%{transform:scale(1.035)}100%{transform:scale(1)}}
  .gbadge{transition:transform .2s}
  .gbadge.pop{animation:badgePop .6s cubic-bezier(.3,1.4,.5,1)}
  @keyframes badgePop{0%{transform:scale(1)}35%{transform:scale(1.7)}100%{transform:scale(1)}}
  .vgain{position:absolute;font-size:13px;font-weight:900;color:var(--good);
    pointer-events:none;animation:floatUp 1s ease-out forwards}
  @keyframes floatUp{0%{opacity:0;transform:translateY(4px)}20%{opacity:1}100%{opacity:0;transform:translateY(-22px)}}

  /* 도트(픽셀) 이펙트 레이어 — 훈련 응원 버디 */
  .px-stage{position:relative;display:flex;flex-direction:column;align-items:center;margin-bottom:12px;
    padding:6px 40px 0}
  .px-chibi{width:104px;height:104px;image-rendering:pixelated;image-rendering:crisp-edges;
    transform-origin:center bottom}
  /* 활동별 영차영차 모션 */
  .fx-sing{animation:fxSing .45s ease-in-out infinite}
  .fx-dance{animation:fxDance .5s ease-in-out infinite}
  .fx-pose{animation:fxPose 1s ease-in-out infinite}
  .fx-charm{animation:fxCharm .6s ease-in-out infinite}
  .fx-act{animation:fxAct .7s ease-in-out infinite}
  .fx-create{animation:fxCreate .8s ease-in-out infinite}
  .fx-rest{animation:fxRest 1.6s ease-in-out infinite}
  @keyframes fxSing{0%,100%{transform:translateY(0) scale(1,1)}50%{transform:translateY(-8px) scale(1.05,.97)}}
  @keyframes fxDance{0%{transform:translateX(-9px) rotate(-9deg)}50%{transform:translateX(9px) rotate(9deg) translateY(-7px)}100%{transform:translateX(-9px) rotate(-9deg)}}
  @keyframes fxPose{0%,100%{transform:scale(1) rotate(-2deg)}50%{transform:scale(1.09) rotate(2deg)}}
  @keyframes fxCharm{0%,100%{transform:rotate(-11deg) translateY(0)}50%{transform:rotate(11deg) translateY(-5px)}}
  @keyframes fxAct{0%,100%{transform:translateX(0) scaleX(1)}30%{transform:translateX(-7px) scaleX(1.06)}60%{transform:translateX(7px) scaleX(.95)}}
  @keyframes fxCreate{0%,100%{transform:translateY(0) rotate(0)}25%{transform:translateY(-5px) rotate(-5deg)}75%{transform:translateY(-5px) rotate(5deg)}}
  @keyframes fxRest{0%,100%{transform:scale(1,1)}50%{transform:scale(1.03,.96) translateY(3px)}}
  /* 결과별 마무리 모션 */
  .rx-jump{animation:rxJump .55s cubic-bezier(.3,1.4,.5,1) 2}
  .rx-ok{animation:rxOk .4s ease-out 2}
  .rx-droop{animation:rxDroop .6s ease-out forwards}
  .rx-fall{animation:rxFall .7s ease-in forwards}
  @keyframes rxJump{0%{transform:translateY(0) rotate(0)}45%{transform:translateY(-36px) rotate(10deg)}100%{transform:translateY(0)}}
  @keyframes rxOk{0%,100%{transform:translateY(0)}50%{transform:translateY(-13px)}}
  @keyframes rxDroop{0%{transform:translateY(0) rotate(0) scale(1)}100%{transform:translateY(7px) rotate(-5deg) scale(.93)}}
  @keyframes rxFall{0%{transform:translateY(0) rotate(0)}55%{transform:translateY(0) rotate(72deg)}100%{transform:translateY(16px) rotate(90deg)}}
  .px-floor{width:120px;height:16px;border-radius:50%;margin-top:-8px;
    background:radial-gradient(rgba(236,58,92,.2),transparent 70%)}
  .px-note{position:absolute;font-size:22px;color:var(--accent);opacity:0;
    animation:pxnote 1.2s ease-out infinite}
  .px-note.n1{left:20%;top:34%;animation-delay:0s}
  .px-note.n2{right:18%;top:24%;animation-delay:.45s}
  .px-note.n3{left:32%;top:12%;animation-delay:.85s}
  @keyframes pxnote{0%{opacity:0;transform:translateY(8px) scale(.8) rotate(-8deg)}
    25%{opacity:1}100%{opacity:0;transform:translateY(-30px) scale(1.15) rotate(10deg)}}
  .px-spark{position:absolute;width:9px;height:9px;image-rendering:pixelated;pointer-events:none;border-radius:1px}
  @keyframes pxfly{0%{opacity:1;transform:translate(0,0) scale(1)}
    100%{opacity:0;transform:translate(var(--dx),var(--dy)) scale(.3)}}
  /* 레티리니 이모티콘 캐릭터 (훈련 씬) */
  .emo-char{width:152px;height:152px;object-fit:cover;border-radius:24px;
    background:linear-gradient(160deg,#ffe6ec,#fff3f5);box-shadow:0 8px 24px rgba(236,58,92,.2)}
  .emo-idle{animation:emoIdle 1.7s ease-in-out infinite}
  @keyframes emoIdle{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
  .emo-pop{animation:emoIn .5s cubic-bezier(.3,1.35,.5,1)}

<script>
// 검색용 아이돌: idols.js의 window.IDOL_DB (최애돌 실데이터 상위 250명). 로드 실패 시 빈 배열.
const IDOLS = window.IDOL_DB || [];

// 6대 능력치 (육각형)
const STATS = [
  {k:"vocal",   n:"보컬",       ico:"🎵", c:"#ff7ab8"},
  {k:"dance",   n:"댄스",       ico:"💃", c:"#5fc9ff"},
  {k:"visual",  n:"비주얼",     ico:"✨", c:"#ffca5f"},
  {k:"charm",   n:"끼",         ico:"🎭", c:"#a97bff"},
  {k:"acting",  n:"연기",       ico:"🎬", c:"#ff8a6b"},
  {k:"creative",n:"크리에이티브",ico:"🎼", c:"#4fe0c0"},
];
const MENTAL = {k:"mental", n:"멘탈", ico:"🧠", c:"#9aa6c9"};

// 등급 F ~ SS — 스탯은 누적 포인트 P. 100마다 등급 1개↑ (게이지 꽉차면 등급업).
// level 0~7 = F E D C B A S SS. 게이지 = 현재 등급 안에서의 진행도(0~100).
const GRADES=["F","E","D","C","B","A","S","SS"];
function levelOf(p){ return Math.min(7, Math.floor(Math.max(0,p)/100)); }
function progOf(p){ return levelOf(p)>=7 ? 100 : Math.floor(Math.max(0,p)%100); } // 게이지 표시값
function grade(p){ return GRADES[levelOf(p)]; }
const GRADE_COLOR={SS:"#ffd35c",S:"#ff5fa2",A:"#c48bff",B:"#5fc9ff",C:"#4fd6a0",D:"#8f9bbf",E:"#77809e",F:"#606784"};

// 타고난 재능 (특기 기반 — 검색·커스텀 공통). 스탯은 누적 P 스케일(0~800).
function talentOf(spec){
  const keys = STATS.map(s=>s.k);
  if(!keys.includes(spec)) spec=keys[0];
  const base = {}; keys.forEach(k=>base[k]=12);
  base.mental=42;
  base[spec] += 18;                                   // 특기 (초기 살짝 앞섬)
  const si=keys.indexOf(spec);
  base[keys[(si+3)%keys.length]] += 2;                // 준특기(맞은편)
  return {base, spec};
}

const TRAININGS = [
  {k:"vocal",   ico:"🎵", t:"보컬 레슨",   d:"발성·음정"},
  {k:"dance",   ico:"💃", t:"댄스 연습",   d:"안무·체력"},
  {k:"visual",  ico:"✨", t:"비주얼 관리", d:"스타일링"},
  {k:"charm",   ico:"🎭", t:"예능 도전",   d:"끼·화술"},
  {k:"acting",  ico:"🎬", t:"연기 학원",   d:"발연기 탈출"},
  {k:"creative",ico:"🎼", t:"작업실",      d:"작사·작곡"},
];
const REST = {k:"rest", ico:"😴", t:"휴식", d:"컨디션 회복 + 멘탈 ↑"};

// 훈련 도트 연출: 활동별 동작(영차영차) + 결과별 마무리
const TRAIN_FX = {
  vocal:   {motion:"fx-sing",   notes:["♪","♫","🎵"], word:"노래 연습 중"},
  dance:   {motion:"fx-dance",  notes:["✨","💫","✨"], word:"춤 연습 중"},
  visual:  {motion:"fx-pose",   notes:["✨","💖","✨"], word:"비주얼 가꾸는 중"},
  charm:   {motion:"fx-charm",  notes:["💕","⭐","💕"], word:"끼 발산 중"},
  acting:  {motion:"fx-act",    notes:["❗","💬","❗"], word:"연기 연습 중"},
  creative:{motion:"fx-create", notes:["🎶","💡","🎶"], word:"작업 중"},
  rest:    {motion:"fx-rest",   notes:["💤","💤","💤"], word:"휴식 중"},
};
const RESULT_FX = {
  dbad: {motion:"rx-fall",  burst:"debris"},
  fail: {motion:"rx-droop", burst:"none"},
  ok:   {motion:"rx-ok",    burst:"small"},
  great:{motion:"rx-jump",  burst:"party"},
};

// 컨디션이 핵심 레버: 높으면 대성공↑·안정, 낮으면 대실패 급증·대성공 희박.
// 컨디션 0에서 훈련하면 대실패/실패가 70%+ → 사실상 도박(재율애비 요청: 저컨디션 페널티 크게)
function rollJudge(cond, mental){
  let pGreat = Math.max(0, 0.03 + cond*0.0035);            // 0:0.03  50:0.205  100:0.38
  let pDbad  = Math.max(0.02, 0.44 - cond*0.0052 - mental/1400); // 0:~0.41 50:~0.15 100:~0.02
  let pFail  = Math.max(0.05, 0.34 - cond*0.0022 - mental/1600);
  const r = Math.random();
  if(r < pDbad) return "dbad";
  if(r < pDbad + pFail) return "fail";
  if(r > 1 - pGreat) return "great";
  return "ok";
}
const JUDGE = {
  dbad:{cls:"dc", label:"대실패…", emoji:"💥", mult:-0.5, cond:-24, fanMult:0.2},
  fail:{cls:"f",  label:"실패",    emoji:"😥", mult:0.28, cond:-14, fanMult:0.4},
  ok:  {cls:"s",  label:"성공!",   emoji:"👍", mult:1.0,  cond:-9,  fanMult:1.0},
  great:{cls:"dg",label:"대성공!!",emoji:"🔥", mult:2.1,  cond:-4,  fanMult:2.3},
};

// 성장곡선(등급별 계단식 우하향): 낮은 등급 쭉쭉(도파민) → 높은 등급 뻑뻑.
// level 0~7 = F E D C B A S SS. 등급 오를수록 같은 훈련이 덜 오름.
const GROWTH_BY_LEVEL=[2.6, 2.4, 2.1, 1.75, 1.35, 0.92, 0.5, 0.24];
function growthMult(p){ return GROWTH_BY_LEVEL[levelOf(p)]; }

// 선택지 두 종류:

// 리스크(분기형) win 보상은 일반 훈련 한방(대성공급)보다 크게 — 리스크 테이킹이 이득이 되도록.
const EVENTS = [
  // ── 분기형 (도전·리스크) ──

    const rd=new FileReader();
    rd.onload=e=>{ const img=new Image();
      img.onload=()=>{ const S=256, cv=document.createElement("canvas"); cv.width=S; cv.height=S;
        const x=cv.getContext("2d"), m=Math.min(img.width,img.height);
        x.drawImage(img,(img.width-m)/2,(img.height-m)/2,m,m,0,0,S,S);
        this.customImg=cv.toDataURL("image/jpeg",0.85);
        const up=document.getElementById("uploader");
        up.style.backgroundImage=`url('${this.customImg}')`;
        document.getElementById("upPh").style.display="none";
      };
      img.src=e.target.result;
    };
    rd.readAsDataURL(f);
  },
  customValidate(){ this.updateStartFab(); },
  // 플로팅 시작 버튼: 선택되면 하단에 떠오르고, 선택된 이름 표시
  updateStartFab(){
    const btn=document.getElementById("startBtn");

      ? !!((document.getElementById("customName").value||"").trim() && this.customSpec)
      : !!this.selIdol;

      btn.textContent=t("sel_start_named",{name:nm});

    const nx=MS.find(m=>m.w>=s.week)||MS[MS.length-1];
    const prevW=(MS.filter(m=>m.w<nx.w).map(m=>m.w).pop())||0;
    const prog=Math.max(6,Math.min(100,Math.round((s.week-prevW)/(nx.w-prevW)*100)));

        <span class="body"><span class="t">${t("tr_rest_t")}</span><span class="d">${t("tr_rest_d")}</span></span>

  train(kind){
    const s=this.st; if(s.busy) return; s.busy=true;
    if(kind==="rest"){
      const gain=26+Math.round(Math.random()*14);
      s.cond=Math.min(100,s.cond+gain); s.mental+=3;
      this.trainReveal(s.idol, "rest", "ok", {cls:"s",label:"휴식 😌",emoji:"😌"},
        `컨디션 <b>+${gain}</b> · 멘탈 <b>+3</b>`, "푹 쉬자~ 😌",
        ()=>{ this.render(); this.afterTurn(); });
      return;
    }
    const j=rollJudge(s.cond,s.mental), J=JUDGE[j];
    const stat=STATS.find(x=>x.k===kind);
    const baseGain=19+Math.round(Math.random()*6);
    // 히든 특기 가점: 타고난 특기 훈련이 더 잘 자람 (준특기는 소폭). UI엔 안 보임.
    const keys=STATS.map(x=>x.k), si=keys.indexOf(s.idol.spec);
    const talent = kind===s.idol.spec ? 1.22 : (kind===keys[(si+3)%keys.length] ? 1.1 : 1.0);
    let gain = J.mult>0 ? Math.round(baseGain*J.mult*growthMult(s[kind])*talent)
                        : Math.round(baseGain*J.mult);
    const oldV=Math.round(s[kind]), oldG=grade(oldV), oldL=levelOf(oldV);
    s[kind]=Math.max(0,s[kind]+gain);
    s.cond=Math.max(0,s.cond+J.cond);
    if(j==="dbad") s.mental=Math.max(0,s.mental-6);
    const fanGain=Math.round((30+s[kind]*0.6)*J.fanMult);
    s.fans+=fanGain;
    const newV=Math.round(s[kind]), newG=grade(newV), newL=levelOf(newV);
    const sign=gain>=0?"+":"";
    const gradeUp = newL>oldL;   // 게이지 100 넘겨 등급 상승
    if(gradeUp) this.logWeek(`${stat.ico} <b>${stat.n}</b>가 <b style="color:var(--accent)">${oldG}→${newG}</b> 등급으로 올랐어!`);
    const say={dbad:"으악, 망했다…😵",fail:"아쉬워…😥",ok:"좋았어! 👍",great:"완전 대박이야!! 🔥"}[j]||"";
    this.trainReveal(s.idol, kind, j, J,
      `${stat.ico} ${stat.n} <b>${sign}${gain}</b><br>팬 <b>+${fmt(fanGain)}</b> · 컨디션 <b>${J.cond}</b>`,
      say,
      ()=>{ this.render(); this.bumpStat(kind, oldV, newV, oldG, newG);
            setTimeout(()=>this.afterTurn(), 900); });
  },

  // 훈련 씬: 활동 동작(영차영차) → 결과 마무리 (성별·활동·결과별 도트 연출)
  trainReveal(idol, kind, jkey, J, deltaHtml, say, done){
    const ov=document.getElementById("ov");
    ov.className="ov on"; ov.onclick=null;
    const fx = TRAIN_FX[kind] || TRAIN_FX.vocal;
    const R  = RESULT_FX[jkey] || RESULT_FX.ok;
    // ── Phase 1: 활동 (레티리니 이모티콘) ──
    ov.innerHTML=`<div class="px-stage" id="pxStage">
        <img class="emo-char emo-idle" id="emoChar" src="assets/emo/act-${kind}.png" alt="">
        <div class="train-say" id="pxSay">${fx.word}…</div>
      </div>`;
    // ── Phase 2: 결과 (1.1초 뒤 이모티콘 전환) ──
    clearTimeout(this._pxPhase);
    this._pxPhase=setTimeout(()=>{
      const el=document.getElementById('emoChar');
      if(el){ el.src=`assets/emo/res-${jkey}.png`; el.className='emo-char emo-pop'; }
      if(R.burst==="party") this.pxSparkle(ov,18,null,false);
      else if(R.burst==="small") this.pxSparkle(ov,7,['#4fd6a0','#5fc9ff','#ffd35c'],false);
      const sayEl=document.getElementById('pxSay');
      if(sayEl){ sayEl.textContent=say||""; sayEl.style.color="var(--txt)"; }
      const info=document.createElement('div');
      info.innerHTML=`<div class="roll ${J.cls}">${J.emoji}</div>
        <div class="roll ${J.cls}" style="font-size:28px">${J.label}</div>
        <div class="delta">${deltaHtml}</div>`;
      ov.appendChild(info);
      setTimeout(()=>{ ov.onclick=()=>{ clearTimeout(this._pxPhase);
          ov.className="ov"; ov.onclick=null; done(); };
        const h=document.createElement("div");h.className="muted";h.style.marginTop="12px";
        h.textContent="탭해서 계속";ov.appendChild(h);
      }, 450);
    }, 1100);
  },
  pxSparkle(container, count, colors, down){
    const stage=container.querySelector('.px-stage'); if(!stage) return;
    const pal=colors||['#ff5f8a','#ffd35c','#5fc9ff','#8b5cff','#4fd6a0','#ec3a5c'];
    for(let i=0;i<(count||16);i++){
      const s=document.createElement('div'); s.className='px-spark';
      const ang=Math.random()*6.283, dist=42+Math.random()*66;
      const dy = down ? Math.abs(Math.sin(ang))*dist+18 : Math.sin(ang)*dist;
      s.style.background=pal[i%pal.length];
      s.style.left='50%'; s.style.top='40%';
      s.style.setProperty('--dx',(Math.cos(ang)*dist).toFixed(0)+'px');
      s.style.setProperty('--dy',(dy).toFixed(0)+'px');
      s.style.animation='pxfly .85s ease-out forwards';
      stage.appendChild(s); setTimeout(()=>s.remove(), 950);
    }
  },

  // 게이지 채우기 + 숫자 카운트업 + 등급 상승 팝. 게이지 100 채우면 리셋되며 등급업.
  bumpStat(kind, oldV, newV, oldG, newG){
    const box=document.getElementById("statBox");
    const row=box && box.querySelector(`.stat[data-k="${kind}"]`);
    if(!row) return;
    const bar=row.querySelector('.bar > i'), numEl=row.querySelector('.v'), badge=row.querySelector('.gbadge');
    const oldP=progOf(oldV), newP=progOf(newV);
    const levelUp = levelOf(newV)>levelOf(oldV);
    if(bar){
      bar.style.transition='none'; bar.style.width=oldP+'%'; void bar.offsetWidth;
      if(levelUp){
        bar.style.transition='width .4s cubic-bezier(.3,.8,.4,1)'; bar.style.width='100%';
        setTimeout(()=>{ bar.style.transition='none'; bar.style.width='0%'; void bar.offsetWidth;
          bar.style.transition='width .55s cubic-bezier(.3,.8,.4,1)'; bar.style.width=newP+'%'; }, 430);
      } else {
        bar.style.transition='width .7s cubic-bezier(.3,.8,.4,1)'; bar.style.width=newP+'%';
      }
    }
    if(numEl){ if(levelUp) setTimeout(()=>countUp(numEl,0,newP,550),450); else countUp(numEl,oldP,newP,700); }
    row.classList.remove('bump'); void row.offsetWidth; row.classList.add('bump');
    setTimeout(()=>row.classList.remove('bump'), 760);
    if(badge && levelUp){ setTimeout(()=>{ badge.textContent=newG; badge.style.background=GRADE_COLOR[newG];
      badge.classList.add('pop'); setTimeout(()=>badge.classList.remove('pop'), 700); }, 450); }
  },

  logWeek(html){ if(!this.st.log) this.st.log=[]; this.st.log.push(`<b>W${this.st.week}</b> · ${html}`); },

  showRoll(J, deltaHtml, done){
    const ov=document.getElementById("ov");
    ov.className="ov on";
    ov.innerHTML=`<div class="roll ${J.cls}">${J.emoji}</div>
      <div class="roll ${J.cls}" style="font-size:30px">${J.label}</div>
      <div class="delta">${deltaHtml}</div>`;
    ov.onclick=null;
    setTimeout(()=>{ ov.onclick=()=>{ov.className="ov";ov.onclick=null;done();};
      const h=document.createElement("div");h.className="muted";h.style.marginTop="18px";
      h.textContent="탭해서 계속";ov.appendChild(h);
    },600);
  },

  // 훈련 끝 → 다음 주로. (관문·이벤트는 '주 시작'에서 처리 — 훈련효과와 분리)
  afterTurn(){ this.nextWeek(); },
  nextWeek(){ this.st.week++; this.st.busy=false; this.save(); this.startWeek(); },
  // 주 시작: 데뷔/관문이면 바로 진행, 아니면 확률로 이벤트 → 닫으면 그 주 훈련 선택
  startWeek(){
    const s=this.st, w=s.week;
    s.busy=false;
    if(w===12){ this.render(); return this.debutJudge(); }
    if(COMPETS[w]){ this.render(); return this.runCompet(w); }
    this.render();
    if(w>=3 && Math.random()<0.25){ s.busy=true; this.showEvent(()=>{ s.busy=false; this.render(); }); }
  },

  // ===== 중간 저장(localStorage) =====
  save(){ try{ if(this.st) localStorage.setItem("idol_save", JSON.stringify(this.st)); }catch(e){} },
  clearSave(){ try{ localStorage.removeItem("idol_save"); }catch(e){} },
  hasSave(){ try{ return !!localStorage.getItem("idol_save"); }catch(e){ return false; } },
  continueGame(){
    let raw; try{ raw=localStorage.getItem("idol_save"); }catch(e){}
    if(!raw){ toast("저장된 게임이 없어"); return; }
    try{ this.st=JSON.parse(raw); }catch(e){ toast("저장 파일을 못 읽었어"); this.clearSave(); return; }
    if(!this.st.log) this.st.log=[];
    show("s-play"); this.startWeek();
    toast(`WEEK ${this.st.week}부터 이어서!`);
  },

  showEvent(done){
    const ev=EVENTS[Math.floor(Math.random()*EVENTS.length)], s=this.st;
    const ov=document.getElementById("ov");
    ov.className="ov on";
    ov.innerHTML=`<div class="ev-card"><div class="ev-emoji">${ev.emoji}</div>
      <div class="ev-title">${ev.title}</div><div class="ev-text">${ev.text}</div>
      <div class="ev-choices" id="evc"></div></div>`;
    ov.onclick=null;
    const box=document.getElementById("evc");
    ev.choices.forEach(ch=>{
      const b=document.createElement("button");
      b.className="btn ghost";
      // 분기형은 예상 성공확률을 미리 보여줌(우마무스메식 리스크 판단)
      if(ch.odds){
        const pct=Math.round(Math.min(0.92,ch.odds(s))*100);
        b.innerHTML=`${ch.t} <span style="opacity:.55;font-size:12px;font-weight:600">· 성공 ${pct}%</span>`;
      } else b.textContent=ch.t;
      b.onclick=()=>{
        if(ch.odds){
          const winr = Math.random() < Math.min(0.92, ch.odds(s));
          const res = winr ? ch.win : ch.lose;
          res.fx(s); clampState(s);
          ov.className="ov";
          this.showRoll({cls:winr?"dg":"dc",label:res.label,emoji:res.emoji},
            res.desc, ()=>{ this.render(); done(); });
        } else {
          ch.fx(s); clampState(s);
          ov.className="ov"; this.render(); done();
        }
      };
      box.appendChild(b);
    });
  },

  debutJudge(){
    const s=this.st;
    const total=STATS.reduce((a,st)=>a+s[st.k],0);
    const peak=Math.max(...STATS.map(st=>s[st.k]));
    const pass = total>=340 || peak>=150;
    const bonus = pass ? Math.round(1500+total*4) : Math.round(total*2);
    s.fans+=bonus;
    this.logWeek(pass?`🎊 <b>데뷔 성공!</b> 화려하게 데뷔했어`:`😅 <b>언더독 데뷔</b> — 아슬아슬 무대에 섰어`);
    const ov=document.getElementById("ov"); ov.className="ov on"; ov.onclick=null;
    ov.innerHTML=`<div class="ev-card"><div class="ev-emoji">${pass?"🎊":"😅"}</div>
      <div class="ev-title">${pass?"🎉 데뷔 성공!":"😬 언더독 데뷔"}</div>
      <div class="ev-text">${pass?"실력 합격! 화려하게 데뷔했어.":"아슬아슬하게 데뷔… 갈 길이 멀어."}<br>
      데뷔 팬 <b>+${fmt(bonus)}</b><br><br>이제 <b>국내 시장</b>에서 라이벌들과 경쟁이 시작된다.</div>
      <button class="btn" onclick="Game.afterDebut()">11주차로 →</button></div>`;
  },

  // 라이벌과 순위 대결 (필수 경쟁 이벤트)
  runCompet(week){
    const c=COMPETS[week], s=this.st;
    let mine;
    if(c.type==="stage"){
      const f=c.field.reduce((a,k)=>a+s[k],0)/c.field.length;      // 무대 스탯(보컬·댄스·비주얼·끼) 평균
      mine = f * (0.55 + 0.45*s.cond/100) * (0.9 + Math.random()*0.2);
    } else {
      const avg=STATS.reduce((a,st)=>a+s[st.k],0)/6;               // 종합력(시상식 주력)
      const peak=Math.max(...STATS.map(st=>s[st.k]));              // 원톱 한 방도 일부 반영
      const metric=Math.max(avg, peak*AWARD_PEAK_K);
      mine = metric * (1 + Math.min(0.45, s.fans/60000)) * (0.9 + Math.random()*0.2);
    }
    const idxs=[]; while(idxs.length<3){ const r=Math.floor(Math.random()*RIVAL_POOL.length); if(!idxs.includes(r)) idxs.push(r); }
    const rivals=idxs.map(i=>({name:RIVAL_POOL[i], emoji:RIVAL_EMOJI[i], score:c.base*(0.75+Math.random()*0.5), me:false}));
    const board=[{name:s.idol.name, emoji:"🎤", score:mine, me:true}, ...rivals].sort((a,b)=>b.score-a.score);
    const myRank=board.findIndex(r=>r.me)+1;
    this.resolveCompet(c, board, myRank);
  },

  resolveCompet(c, board, myRank){
    const s=this.st, N=board.length, win=myRank===1;
    let head, sub, btn="계속 →", onCont=()=>{ document.getElementById("ov").className="ov"; this.nextWeek(); };

    if(c.type==="stage"){
      if(win){ s.fans+=Math.round(2200+c.base*45); s.mental+=8; s.cond=Math.max(0,s.cond-6);
        head="🏆 음악방송 1위!"; sub="트로피 들고 앵콜! 팬덤이 폭발했어."; }
      else if(myRank<=3){ s.fans+=Math.round(700); s.mental+=3;
        head=`${myRank}위 · 상위권`; sub="1위는 놓쳤지만 존재감은 확실히 남겼어."; }
      else { s.fans+=150; s.mental=Math.max(0,s.mental-6); s.cond=Math.max(0,s.cond-4);
        head=`${myRank}위 · 순위권 밖`; sub="이번 컴백은 묻혔어… 다음을 노리자."; }
    }
    else if(c.gate){   // 국내 대상 = 월드 진출 관문 (1위만!)
      if(win){ const b=Math.round(3800+s.fans*0.04); s.fans+=b; s.mental+=6;
        head="🏆 대상 수상!"; sub=`국내 정상을 찍었어! 팬 <b>+${fmt(b)}</b><br>이제 <b>월드 무대</b>로! 보너스 10주.`;
        btn="Road to World →";
        onCont=()=>{ document.getElementById("ov").className="ov";
          this.cutscene({act:"ACT 3", emoji:"✈️", title:"월드 무대", sub:"ROAD TO THE WORLD",
            talk:"국내 정상 찍었어! 🏆 이제 전 세계가 무대야. 마지막 10주, 글로벌 대상까지 가보자!"},
            ()=>this.nextWeek()); };
      } else { s.fans+=400; head=`${myRank}위 · 대상 불발`;
        sub="국내 대상 <b>1위</b>만 월드 무대에 설 수 있어. 정상의 벽을 넘지 못했어…";
        onCont=()=>{ document.getElementById("ov").className="ov"; this.finish(false); }; btn="결과 확인 →"; }
    }
    else if(c.final){  // 글로벌 대상 = 최종
      const b=Math.round(4000+(N-myRank+1)*1900+s.fans*0.04); s.fans+=b;
      head = win?"👑 글로벌 대상 수상!":`${myRank}위`;
      sub = `${win?"세계가 인정했어. 정점이야.":"월드 무대의 여정을 마쳤어."}<br>대상 팬 <b>+${fmt(b)}</b>`;
      onCont=()=>{ document.getElementById("ov").className="ov";
        this.resultLoading(()=>this.finish(true, myRank)); }; btn="최종 결과 →";
    }
    this.logWeek(`${c.emoji} <b>${c.title}</b> — ${head.replace(/<[^>]+>/g,"")}`);
    this.showCompetBoard(c, board, myRank, head, sub, btn, onCont);
  },

  showCompetBoard(c, board, myRank, head, sub, btnLabel, onCont){
    const ov=document.getElementById("ov"); ov.className="ov on"; ov.onclick=null;
    const rows=board.map((r,i)=>{
      const medal=["🥇","🥈","🥉"][i]||`${i+1}`;
      return `<div class="lb-row ${r.me?"me":""}"><span class="r">${medal}</span>
        <span class="who">${r.emoji} ${esc(r.name)}${r.me?" <small>· 나</small>":""}</span>
        <span class="sc" style="color:var(--sub)">${Math.round(r.score)}</span></div>`;
    }).join("");
    ov.innerHTML=`<div class="ev-card"><div class="ev-emoji">${c.emoji}</div>
      <div class="ev-title">${c.title}</div>
      <div class="ev-text" style="margin-bottom:8px"><b style="color:var(--txt);font-size:16px">${head}</b><br>${sub}</div>
      <div class="lb" style="margin:0 0 14px;text-align:left">${rows}</div>
      <button class="btn" id="competCont">${btnLabel}</button></div>`;
    document.getElementById("competCont").onclick=onCont;
  },
  contAfterJudge(){ document.getElementById("ov").className="ov"; this.nextWeek(); },

  // ===== 연출: 페이즈 전환 컷씬 =====
  cutscene(opt, cb){
    const cs=document.getElementById("cutscene");
    cs.className="cutscene on";
    cs.innerHTML=`<div class="cs-in">
        <div class="cs-act">${opt.act}</div>
        <div class="cs-emoji">${opt.emoji}</div>
        <div class="cs-title">${opt.title}</div>
        <div class="cs-sub">${opt.sub}</div>
        <div class="cs-talk"><img class="cs-mascot" src="assets/mascot.png" alt="">
          <div class="cs-bubble">${opt.talk}</div></div>
      </div><div class="cs-tap">탭하여 계속 →</div>`;
    let done=false;
    const go=()=>{ if(done) return; done=true; cs.onclick=null; cs.className="cutscene"; cb&&cb(); };
    cs.onclick=go;
    this._csTimer=setTimeout(go, 3400);   // 자동 진행(탭하면 스킵)
  },
  afterDebut(){
    document.getElementById("ov").className="ov";
    this.cutscene({act:"ACT 2", emoji:"🎤", title:"국내 시장 진출", sub:"DOMESTIC MARKET",
      talk:"데뷔 성공! 🎉 이제 국내 라이벌들과 진짜 승부야. 음악방송·시상식 1위 노려보자!"},
      ()=>this.nextWeek());
  },

  // ===== 연출: 최종 결과 집계 로딩 =====
  resultLoading(cb){
    const el=document.getElementById("loading");
    el.className="loading on";
    el.innerHTML=`<div class="load-ring"></div>
      <div class="load-txt">최종 집계 중…</div>
      <div class="load-step" id="loadStep">전 세계 투표 취합 중…</div>`;
    const steps=["전 세계 투표 취합 중…","글로벌 차트 반영 중…","최종 팬덤 규모 확정 중…","결과 카드 생성 중…"];
    let i=0; const st=document.getElementById("loadStep");
    const iv=setInterval(()=>{ i++; if(i<steps.length) st.textContent=steps[i]; }, 780);
    setTimeout(()=>{ clearInterval(iv); el.className="loading"; cb&&cb(); }, 3400);
  },

  ending(reachedWorld, finalRank){
    const s=this.st;
    const arr=STATS.map(st=>({...st, v:s[st.k]})).sort((a,b)=>b.v-a.v);
    const top=arr[0], total=arr.reduce((a,b)=>a+b.v,0), minV=arr[arr.length-1].v;
    const gap=top.v-arr[1].v;
    const stage4=(s.vocal+s.dance+s.visual+s.charm)/4;   // 무대 4종 평균
    const stageStar = stage4>=440 && minV<340;            // 무대 특화(연기·크리 낮음)
    const onetopTitles={vocal:"세계가 인정한 보컬리스트",dance:"월드클래스 퍼포머",
      visual:"글로벌 비주얼 아이콘",charm:"예능·화제성 끝판왕",
      acting:"스크린을 접수한 배우돌",creative:"자컨·자작곡 아티스트"};

    if(!reachedWorld){
      if(total<680 && top.v<430) return {emoji:"💔",name:"팀 해체",tier:"F",
        sub:`국내의 벽을 넘지 못하고 해체됐어… 다음 생엔 꼭.`};
      if(stageStar) return {emoji:"🎭",name:"무대형 지역 스타",tier:"C",
        sub:`무대 위에선 빛났지만 국내 대상의 벽은 높았어. 무대장악력은 진짜였어.`};
      return {emoji:"🌗",name:`${top.n} 지역 스타`,tier:"C",
        sub:`국내 대상 1위는 놓쳤지만 <b>${top.n}</b> 하나로 단단한 마니아 팬층을 남겼어.`};
    }
    const champ=finalRank===1, podium=finalRank<=3;
    const superA = minV>=410 && total>=2750;   // 6각 모두 A이상
    const onetop  = top.v>=620 && gap>=180;      // 한 스탯 S~SS 원톱
    const allround= minV>=340 && total>=2400;
    const solid   = minV>=230 && total>=1900;

    // SS — 6각 완성 (실력이 SS급, 순위 무관)
    if(superA) return {emoji:"🌟",name:"글로벌 육각형 슈퍼스타",tier:"SS",
      sub:`약점이 없어. 6가지 재능 모두 정상급인 완성형 월드스타.${champ?" 글로벌 대상까지 석권한 역대급이야.":" 역대급이야."}`};
    // S — 대상 1위 + 원톱
    if(champ && onetop) return {emoji:"👑",name:onetopTitles[top.k],tier:"S",
      sub:`<b>${top.n} ${grade(top.v)}등급.</b> 압도적 한 방으로 글로벌 대상을 거머쥐었어.`};
    // S — 대상 1위 + 올라운더
    if(champ && allround) return {emoji:"🏆",name:"월드 정상 올라운더",tier:"S",
      sub:`고르게 최상급인 육각형으로 글로벌 대상까지! 오래 사랑받을 대형 스타.`};
    // S — 원톱 실력으로 상위 입상
    if(onetop && podium) return {emoji:"👑",name:onetopTitles[top.k],tier:"S",
      sub:`<b>${top.n} ${grade(top.v)}등급.</b> 확실한 한 방으로 세계 정상권에 섰어.`};
    // S — 무대 4종 특화로 상위 입상
    if(stageStar && podium) return {emoji:"🎆",name:"무대를 장악한 퍼포머",tier:"S",
      sub:`보컬·댄스·비주얼·끼 4각이 압도적. 무대 위 카리스마로 세계를 홀렸어.`};
    // S — 완성형 올라운더
    if(allround) return {emoji:"🌈",name:"만능 올라운더 월드스타",tier:"S",
      sub:`모난 데 없이 두루 잘하는 육각형. 오래 사랑받을 대형 스타야.`};
    // A — 무대형 (입상은 못했지만 무대는 최강)
    if(stageStar) return {emoji:"🎭",name:"무대형 퍼포먼스 스타",tier:"A",
      sub:`무대 위에선 최강. 예능·연기까지 갖추면 육각형도 노려볼만해.`};
    // A — 대상 1위지만 스탯은 평범 (화제성·팬덤으로 대관식)
    if(champ) return {emoji:"🎉",name:"이변의 대관식",tier:"A",
      sub:`압도적 실력은 아니어도 화제성과 팬덤으로 글로벌 대상을 차지했어. 이것도 스타의 자질이야.`};
    // A — 준수 + 상위 입상
    if(solid && podium) return {emoji:"⭐",name:"믿고 보는 대형 스타",tier:"A",
      sub:`빈틈 없이 성장했고 글로벌 시상식 입상까지. 어디 내놔도 손색없어.`};
    // A — 준수
    if(solid) return {emoji:"✨",name:"준수한 성장형 스타",tier:"A",
      sub:`두루 준수하게 컸어. 다음 챕터가 더 기대되는 재목이야.`};
    // B — 얇고 길게
    return {emoji:"🌱",name:"얇고 길게 가는 아이돌",tier:"B",
      sub:`한 방은 없지만 꾸준함으로 승부하는 롱런형. 이것도 능력이야.`};
  },

  finish(reachedWorld, finalRank, shared){
    if(!shared) this.clearSave();   // 게임 종료 — 이어하기 삭제
    const s=this.st;
    const statTotal=STATS.reduce((a,st)=>a+s[st.k],0);
    if(!shared) s.fans+=Math.round(statTotal*35 + s.mental*8);  // 공유 결과는 이미 최종 팬
    const end=this.ending(reachedWorld, finalRank);
    const dexNew=shared ? false : this.dexAdd(dexIdOf(end));   // 엔딩 도감 기록 (첫 달성이면 true)
    const statVals=STATS.map(st=>({n:st.n,k:st.k,c:st.c,v:Math.round(s[st.k]),g:grade(Math.round(s[st.k]))}));
    const overall=grade(Math.round(statTotal/STATS.length));
    const spStat=STATS.find(x=>x.k===s.idol.spec)||STATS[0];
    this.lastResult={name:s.idol.name,grp:s.idol.grp,ending:end.name,emoji:end.emoji,
      tier:end.tier,fans:s.fans,reachedWorld,statVals,overall,finalRank:finalRank||null,
      spec:s.idol.spec, specName:spStat.n, specIco:spStat.ico, specColor:spStat.c, img:s.idol.img||"",
      stage:reachedWorld?(finalRank?`글로벌 대상 ${finalRank}위`:"WORLD TOUR · WEEK 52"):"DOMESTIC 탈락"};
    document.getElementById("endStage").textContent=
      reachedWorld?(finalRank?`글로벌 대상 ${finalRank}위 · WEEK 52 종료`:"WORLD TOUR · WEEK 52 종료"):"DOMESTIC 탈락 · 육성 종료";
    document.getElementById("endIdolBox").style.display="";
    const eav=document.getElementById("endAvatar");
    if(s.idol.img){ eav.src=s.idol.img; eav.style.display=""; } else { eav.style.display="none"; }
    document.getElementById("endIdolName").innerHTML=
      esc(s.idol.name)+(s.idol.grp&&s.idol.grp!=="커스텀 아이돌"?` <small>${esc(s.idol.grp)}</small>`:` <small>커스텀</small>`);
    document.getElementById("endEmoji").textContent=end.emoji;
    document.getElementById("endName").textContent=end.name;
    const dexChip = dexNew ? `<div class="dex-unlock">🎉 새 엔딩 해금! · 도감에 기록됐어</div>` : "";
    document.getElementById("endSub").innerHTML=`${dexChip}${end.sub}<br><br>최종 팬 <b style="color:var(--gold)">${fmt(s.fans)}</b>명`;
    document.getElementById("oGrade").innerHTML=
      `종합 등급 <b>${overall}</b> &nbsp;·&nbsp; 타고난 재능 <b style="color:${spStat.c}">${spStat.ico} ${spStat.n}</b>`;
    const gbox=document.getElementById("growthBox");
    if(s.log && s.log.length){ gbox.style.display="";
      gbox.innerHTML=`<h3>📖 ${esc(s.idol.name)}의 성장 서사</h3>`+s.log.map(l=>`<div class="gl">${l}</div>`).join(""); }
    else gbox.style.display="none";
    const sharedBanner=document.getElementById("sharedBanner");
    if(shared){
      // 공유 링크로 열린 결과: 리더보드/등록 숨기고 '나도 해보기' CTA
      ["shareLinkBtn","shareBtn","nameInput","saveBtn","lbBox"].forEach(id=>{const e=document.getElementById(id);if(e)e.style.display="none";});
      sharedBanner.style.display="";
      sharedBanner.innerHTML=`<b>${esc(s.idol.name)}</b>${t("shared_banner")}`;
      document.getElementById("againBtn").textContent=t("shared_cta");
      document.getElementById("againBtn").onclick=()=>Game.goSelect();
    } else {
      sharedBanner.style.display="none";
      ["shareLinkBtn","shareBtn","nameInput","saveBtn","lbBox"].forEach(id=>{const e=document.getElementById(id);if(e)e.style.display="";});
      document.getElementById("nameInput").value="";
      document.getElementById("againBtn").textContent=t("again_btn");
      document.getElementById("againBtn").onclick=()=>Game.reset();
      this.renderBoard(null);
      this.prepCard();   // 카드 미리 생성 (저장 버튼 제스처 소진 방지)
    }
    document.getElementById("endStage").textContent=
      reachedWorld?(finalRank?t("end_stage_world",{rank:finalRank}):t("end_stage_world_nr")):t("end_stage_out");
    drawRadar(document.getElementById("radar"), statVals, {dark:false});
    show("s-end");
  },
  // 결과 → 공유 링크 인코딩/디코딩
  encodeResult(){
    const r=this.lastResult; if(!r) return "";
    const arr=[r.name, r.grp, r.spec, ...r.statVals.map(v=>v.v), Math.round(r.fans),
      r.finalRank||0, r.reachedWorld?1:0];
    try{ return "r="+encodeURIComponent(btoa(unescape(encodeURIComponent(JSON.stringify(arr))))); }
    catch(e){ return ""; }
  },
  decodeResult(enc){
    try{ const arr=JSON.parse(decodeURIComponent(escape(atob(decodeURIComponent(enc)))));
      return {name:arr[0], grp:arr[1], spec:arr[2], v:arr.slice(3,9).map(Number),
        fans:+arr[9], rank:+arr[10]||null, world:!!arr[11]}; }
    catch(e){ return null; }
  },
  shareLink(){
    const enc=this.encodeResult(); if(!enc){ toast(t("toast_save_broken")); return; }
    const url=location.origin+location.pathname+"?"+enc;
    const r=this.lastResult;
    const shareData={title:t("t_title"), text:t("share_text",{name:r.name,ending:r.ending}), url};
    if(navigator.share){
      navigator.share(shareData).catch(e=>{ if(e.name!=="AbortError") this.copyLink(url); });
    } else { this.copyLink(url); }
  },
  copyLink(url){
    if(navigator.clipboard && navigator.clipboard.writeText){
      navigator.clipboard.writeText(url).then(()=>toast(t("toast_link_copied"))).catch(()=>this.promptLink(url));
    } else this.promptLink(url);
  },
  promptLink(url){ window.prompt(t("toast_link_copied"), url); },
  // 공유 링크로 열렸을 때 결과 재현
  showSharedResult(d){
    const st=STATS.map(x=>x.k);
    this.st={idol:{name:d.name, grp:d.grp||t("custom_idol"), spec:d.spec, img:""},
      mental:60, fans:d.fans, week:52, log:[]};
    st.forEach((k,i)=>this.st[k]=d.v[i]||0);
    this.lastResult=null;
    this.finish(d.world, d.rank, true);
  },

  // ===== 결과 카드 이미지 =====
  async makeCard(){
    const r=this.lastResult; const W=1080,H=1350;
    const cv=document.createElement("canvas"); cv.width=W; cv.height=H;
    const x=cv.getContext("2d");
    // 밝은 앱톤 배경
    const bg=x.createLinearGradient(0,0,0,H);
    bg.addColorStop(0,"#ffe4ea"); bg.addColorStop(.5,"#fff2f4"); bg.addColorStop(1,"#ffffff");
    x.fillStyle=bg; x.fillRect(0,0,W,H);
    const rg=x.createRadialGradient(W/2,-120,60,W/2,-120,780);
    rg.addColorStop(0,"rgba(236,58,92,.16)"); rg.addColorStop(1,"rgba(236,58,92,0)");
    x.fillStyle=rg; x.fillRect(0,0,W,660);
    x.textAlign="center";
    x.fillStyle="#ec3a5c"; x.font="700 30px 'Apple SD Gothic Neo',sans-serif";
    x.fillText("최애돌 · 아이돌 육성 타이쿤", W/2, 74);
    // 아이돌 원형 사진 (로컬/커스텀만 — 원격 URL은 canvas 오염 방지로 생략)
    const canUse = r.img && (r.img.startsWith('assets/') || r.img.startsWith('data:'));
    const face = canUse ? await loadImg(r.img) : null;
    const CY=228, R=96;
    if(face){
      x.save(); x.beginPath(); x.arc(W/2,CY,R,0,7); x.closePath(); x.clip();
      const iw=face.naturalWidth, ih=face.naturalHeight, m=Math.min(iw,ih);
      x.drawImage(face,(iw-m)/2,(ih-m)/2,m,m,W/2-R,CY-R,R*2,R*2); x.restore();
    } else {
      x.fillStyle="#ffe0e6"; x.beginPath(); x.arc(W/2,CY,R,0,7); x.fill();
      x.font="86px sans-serif"; x.fillText("🎤",W/2,CY+30);
    }
    x.beginPath(); x.arc(W/2,CY,R,0,7); x.lineWidth=6; x.strokeStyle="#ec3a5c"; x.stroke();
    // 이름·그룹
    x.fillStyle="#2b2530"; x.font="800 66px 'Apple SD Gothic Neo',sans-serif";
    x.fillText(r.name, W/2, 396);
    x.fillStyle="#9a8f9a"; x.font="600 32px 'Apple SD Gothic Neo',sans-serif";
    x.fillText(r.grp, W/2, 442);
    // 엔딩
    x.font="62px sans-serif"; x.fillText(r.emoji, W/2, 528);
    x.fillStyle="#ec3a5c"; x.font="800 46px 'Apple SD Gothic Neo',sans-serif";
    x.fillText(r.ending, W/2, 588);
    x.fillStyle="#9a8f9a"; x.font="600 28px 'Apple SD Gothic Neo',sans-serif";
    x.fillText(`타고난 재능 · ${r.specName||"-"}`, W/2, 632);
    // radar
    drawRadarCtx(x, W/2, 858, 186, r.statVals, {dark:false, big:true});
    // 하단 바 (흰 카드)
    x.fillStyle="#ffffff"; x.strokeStyle="#ffd9de"; x.lineWidth=2.5;
    roundRect(x,80,1130,W-160,150,24); x.fill(); x.stroke();
    x.textAlign="left";
    x.fillStyle="#9a8f9a"; x.font="600 30px 'Apple SD Gothic Neo',sans-serif";
    x.fillText("종합 등급", 130, 1190);
    x.fillStyle=GRADE_COLOR[r.overall]; x.font="900 66px 'Apple SD Gothic Neo',sans-serif";
    x.fillText(r.overall, 130, 1260);
    x.textAlign="right";
    x.fillStyle="#9a8f9a"; x.font="600 30px 'Apple SD Gothic Neo',sans-serif";
    x.fillText("최종 팬", W-130, 1190);
    x.fillStyle="#f0a01e"; x.font="900 60px 'Apple SD Gothic Neo',sans-serif";
    x.fillText(fmt(r.fans), W-130, 1258);
    x.textAlign="center"; x.fillStyle="#b9adb4"; x.font="600 25px 'Apple SD Gothic Neo',sans-serif";
    x.fillText("🐥 최애돌에서 내 최애 키우기", W/2, 1328);
    return cv;
  },
  // 결과화면 진입 시 카드 이미지를 미리 만들어 캐시 (저장 버튼의 제스처 소진 방지)
  prepCard(){
    const r=this.lastResult; if(!r) return;
    r.cardFile=null;
    this.makeCard().then(cv=>{
      cv.toBlob(blob=>{
        if(!blob || this.lastResult!==r) return;
        r.cardBlob=blob;
        r.cardFile=new File([blob],`idol-tycoon-${r.name}.png`,{type:"image/png"});
      },"image/png");
    }).catch(()=>{});
  },
  downloadCard(file){
    const a=document.createElement("a");
    a.href=URL.createObjectURL(file); a.download=file.name; a.click();
    setTimeout(()=>URL.revokeObjectURL(a.href),4000);
    toast("이미지를 저장했어! 📸");
  },
  isMobile(){ return /Android|iPhone|iPad|iPod/i.test(navigator.userAgent||""); },
  // share가 안 되는 모바일: a.download는 사진첩에 안 들어감 → 이미지 띄워 '길게 눌러 저장' 유도
  fallbackSave(file){
    if(this.isMobile()){ this.showCardImage(file); }
    else { this.downloadCard(file); }
  },
  showCardImage(file){
    const url=URL.createObjectURL(file);
    const inApp=/KAKAOTALK|FBAN|FBAV|Instagram|Line|NAVER/i.test(navigator.userAgent||"");
    const ov=document.getElementById("ov"); ov.className="ov on";
    ov.innerHTML=`<div class="cardsave">
        <div class="cardsave-tip">📸 아래 이미지를 <b>길게 눌러</b><br>"이미지 저장 / 사진에 추가"를 선택해줘</div>
        <img class="cardsave-img" src="${url}" alt="결과 카드">
        ${inApp?`<div class="cardsave-sub">저장이 안 되면 우측 상단 <b>⋮ 메뉴 → 다른 브라우저로 열기</b> 후 다시 시도해줘</div>`:""}
        <button class="btn ghost" style="margin-top:14px" id="cardsaveClose">닫기</button>
      </div>`;
    ov.onclick=null;
    document.getElementById("cardsaveClose").onclick=(e)=>{ e.stopPropagation();
      ov.className="ov"; ov.onclick=null; setTimeout(()=>URL.revokeObjectURL(url),1000); };
  },
  // 저장·공유: 미리 만든 파일을 await 없이 즉시 사용 → 사용자 제스처 유지(안드 크롬 대응)
  shareCard(){
    const r=this.lastResult; if(!r) return;
    const file=r.cardFile;
    if(!file){ this.shareCardSlow(); return; }   // 아직 생성 전이면 폴백
    const shareData={files:[file],title:"아이돌 육성 타이쿤",
      text:`${r.name} → ${r.ending} (팬 ${fmt(r.fans)}명)`};
    if(navigator.canShare && navigator.canShare({files:[file]})){
      navigator.share(shareData).catch(e=>{ if(e.name!=="AbortError") this.fallbackSave(file); });
      return;
    }
    this.fallbackSave(file);
  },
  // 폴백(카드 미완성 시): 기존 비동기 경로 — 데스크탑 등에서 동작
  async shareCardSlow(){
    const cv=await this.makeCard();
    cv.toBlob(async (blob)=>{
      const file=new File([blob],`idol-tycoon-${this.lastResult.name}.png`,{type:"image/png"});
      const shareData={files:[file],title:"아이돌 육성 타이쿤",
        text:`${this.lastResult.name} → ${this.lastResult.ending} (팬 ${fmt(this.lastResult.fans)}명)`};
      if(navigator.canShare && navigator.canShare({files:[file]})){
        try{ await navigator.share(shareData); return; }catch(e){ if(e.name==="AbortError") return; }
      }
      this.fallbackSave(file);
    },"image/png");
  },

  board(){ try{return JSON.parse(localStorage.getItem("idol_lb")||"[]");}catch(e){return[];} },
  renderBoard(hl){
    const list=this.board().slice().sort((a,b)=>b.fans-a.fans).slice(0,10);
    const box=document.getElementById("lbBox");
    if(!list.length){box.innerHTML=`<div class="lb-row"><span class="who muted">아직 기록이 없어. 첫 주자가 되어봐!</span></div>`;return;}
    box.innerHTML=list.map((r,i)=>{
      const me=hl!=null && r.fans===hl && r._me;
      const medal=["🥇","🥈","🥉"][i]||`${i+1}`;
      return `<div class="lb-row ${me?"me":""}"><span class="r">${medal}</span>
        <span class="who">${r.emoji||"⭐"} ${esc(r.player||"익명")}
          <small>· ${esc(r.name)} · ${esc(r.ending)}</small></span>
        <span class="sc">${fmt(r.fans)}</span></div>`;
    }).join("");
  },
  saveScore(){
    if(!this.lastResult) return;
    if(this.lastResult._saved){toast("이미 저장했어");return;}
    const player=(document.getElementById("nameInput").value||"익명").slice(0,10);
    const lb=this.board();
    lb.forEach(r=>r._me=false);
    lb.push({player,name:this.lastResult.name,ending:this.lastResult.ending,
      emoji:this.lastResult.emoji,fans:this.lastResult.fans,_me:true});
    localStorage.setItem("idol_lb", JSON.stringify(lb.slice(-200)));
    this.lastResult._saved=true;
    this.renderBoard(this.lastResult.fans);
    toast("명예의 전당에 등록됐어! 🏆");
  },
  showBoard(){
    document.getElementById("endStage").textContent="🏆 명예의 전당";
    document.getElementById("endEmoji").textContent="🏆";
    document.getElementById("endName").textContent="TOP 랭킹";
    document.getElementById("endSub").innerHTML="지금까지 배출된 최고의 스타들";
    document.getElementById("oGrade").innerHTML="";
    document.getElementById("endIdolBox").style.display="none";
    document.getElementById("growthBox").style.display="none";
    const rc=document.getElementById("radar").getContext("2d");
    rc.clearRect(0,0,580,580);
    ["shareBtn","nameInput","saveBtn"].forEach(id=>document.getElementById(id).style.display="none");
    document.getElementById("againBtn").textContent="홈으로";
    this.lastResult=null; this.renderBoard(null); show("s-end");
  },
  reset(){
    ["shareBtn","nameInput","saveBtn"].forEach(id=>document.getElementById(id).style.display="");
    this.st=null;this.selId=null;this.lastResult=null; show("s-title");
    this.refreshTitle();
  },
  refreshTitle(){ const b=document.getElementById("continueBtn"); if(b) b.style.display=this.hasSave()?"":"none"; },

  // ===== 엔딩 도감 =====
  dexGot(){ try{ return new Set(JSON.parse(localStorage.getItem("idol_dex")||"[]")); }catch(e){ return new Set(); } },
  dexAdd(id){ if(!id) return false; const g=this.dexGot(); if(g.has(id)) return false;
    g.add(id); try{ localStorage.setItem("idol_dex", JSON.stringify([...g])); }catch(e){} return true; },
  showDex(){
    const got=this.dexGot();
    document.getElementById("dexCount").textContent=`${got.size} / ${ENDING_DEX.length}`;
    document.getElementById("dexGrid").innerHTML=ENDING_DEX.map(d=>{
      const has=got.has(d.id);
      return `<div class="dexcell ${has?"got":"lock"}">
        <div class="dex-emoji">${has?d.emoji:"🔒"}</div>
        <div class="dex-tier" style="background:${GRADE_COLOR[d.tier]}">${d.tier}</div>
        <div class="dex-name">${has?esc(d.name):"???"}</div>
        <div class="dex-hint">${esc(d.hint)}</div></div>`;
    }).join("");
    show("s-dex");
  },
};

// ===== 레이더 차트 =====
function drawRadar(canvas, statVals, opts){
  const x=canvas.getContext("2d");
  x.clearRect(0,0,canvas.width,canvas.height);
  drawRadarCtx(x, canvas.width/2, canvas.height/2+8, canvas.width*0.31, statVals, opts||{});
}
function drawRadarCtx(x, cx, cy, R, vals, opts){
  const N=vals.length, dark=opts.dark, big=opts.big;
  const ang=i=>-Math.PI/2 + i*(2*Math.PI/N);
  const grid = dark?"rgba(255,255,255,.13)":"rgba(0,0,0,.12)";
  // 그리드 링
  x.lineWidth=1.2;
  for(let k=1;k<=4;k++){
    x.beginPath();
    for(let i=0;i<N;i++){ const r=R*k/4, px=cx+Math.cos(ang(i))*r, py=cy+Math.sin(ang(i))*r;
      i?x.lineTo(px,py):x.moveTo(px,py); }
    x.closePath(); x.strokeStyle=grid; x.stroke();
  }
  // 축
  for(let i=0;i<N;i++){ x.beginPath(); x.moveTo(cx,cy);
    x.lineTo(cx+Math.cos(ang(i))*R, cy+Math.sin(ang(i))*R); x.strokeStyle=grid; x.stroke(); }
  // 데이터 폴리곤 (스탯은 누적 P 0~800 스케일)
  const MAXV=800;
  x.beginPath();
  for(let i=0;i<N;i++){ const r=R*Math.min(MAXV,vals[i].v)/MAXV;
    const px=cx+Math.cos(ang(i))*r, py=cy+Math.sin(ang(i))*r; i?x.lineTo(px,py):x.moveTo(px,py); }
  x.closePath();
  const fill=x.createLinearGradient(cx-R,cy-R,cx+R,cy+R);
  fill.addColorStop(0,"rgba(255,95,162,.42)"); fill.addColorStop(1,"rgba(139,91,255,.42)");
  x.fillStyle=fill; x.fill();
  x.strokeStyle="#ff5fa2"; x.lineWidth=big?3:2.2; x.stroke();
  // 꼭짓점 + 라벨
  const lf=big?"700 26px":"700 12px";
  const gf=big?"900 30px":"900 14px";
  for(let i=0;i<N;i++){
    const r=R*Math.min(MAXV,vals[i].v)/MAXV;
    const px=cx+Math.cos(ang(i))*r, py=cy+Math.sin(ang(i))*r;
    x.beginPath(); x.arc(px,py,big?6:4,0,7); x.fillStyle=vals[i].c; x.fill();
    const lr=R+(big?52:26), lx=cx+Math.cos(ang(i))*lr, ly=cy+Math.sin(ang(i))*lr;
    x.textAlign = Math.abs(Math.cos(ang(i)))<0.3 ? "center" : (Math.cos(ang(i))>0?"left":"right");
    x.fillStyle=dark?"#d9d2f0":"#333"; x.font=lf+" 'Apple SD Gothic Neo',sans-serif";
    x.fillText(vals[i].n, lx, ly-(big?6:3));
    x.fillStyle=vals[i].c; x.font=gf+" 'Apple SD Gothic Neo',sans-serif";
    x.fillText(vals[i].g+" 등급", lx, ly+(big?26:12));
  }
  x.textAlign="left";
}
function roundRect(x,rx,ry,w,h,r){ x.beginPath();
  x.moveTo(rx+r,ry); x.arcTo(rx+w,ry,rx+w,ry+h,r); x.arcTo(rx+w,ry+h,rx,ry+h,r);
  x.arcTo(rx,ry+h,rx,ry,r); x.arcTo(rx,ry,rx+w,ry,r); x.closePath(); }

function show(id){document.querySelectorAll(".screen").forEach(s=>s.classList.remove("on"));
  document.getElementById(id).classList.add("on"); document.getElementById("app").scrollTop=0;}
function fmt(n){return Math.round(n||0).toLocaleString("en-US");}
function clampState(s){ s.cond=Math.max(0,Math.min(100,s.cond)); s.mental=Math.max(0,s.mental);
  s.fans=Math.max(0,Math.round(s.fans)); STATS.forEach(st=>s[st.k]=Math.max(0,Math.round(s[st.k]))); }
function loadImg(src){ return new Promise(res=>{ if(!src){res(null);return;}
  const i=new Image(); i.onload=()=>res(i); i.onerror=()=>res(null); i.src=src; }); }
function countUp(el, from, to, dur){
  const t0=performance.now();
  const step=(t)=>{ const p=Math.min(1,(t-t0)/dur);
    el.textContent=Math.round(from+(to-from)*p); if(p<1) requestAnimationFrame(step); };
  requestAnimationFrame(step);
}
function esc(s){return (s||"").replace(/[<>&]/g,c=>({"<":"&lt;",">":"&gt;","&":"&amp;"}[c]));}
let toastTimer;
function toast(msg){const t=document.getElementById("toast");t.textContent=msg;t.className="toast on";
  clearTimeout(toastTimer);toastTimer=setTimeout(()=>t.className="toast",1900);}

// ===== 다국어 적용 =====
function applyI18n(){
  document.querySelectorAll("[data-i18n]").forEach(el=>{ el.textContent=t(el.dataset.i18n); });
  document.querySelectorAll("[data-i18n-html]").forEach(el=>{ el.innerHTML=t(el.dataset.i18nHtml); });
  document.querySelectorAll("[data-i18n-ph]").forEach(el=>{ el.placeholder=t(el.dataset.i18nPh); });
  document.title=t("t_title");
}
function initLangSwitch(){
  const sel=document.getElementById("langSel"); if(!sel) return;
  sel.innerHTML=langList().map(l=>`<option value="${l.code}"${l.code===window.LANG?" selected":""}>${l.name}</option>`).join("");
}
Game.changeLang=function(l){ setLang(l); applyI18n(); initLangSwitch();
  document.getElementById("customName")&&(document.getElementById("customName").placeholder=t("sel_name_ph")); };

// 초기화
initLangSwitch();
applyI18n();
Game.refreshTitle();
// 공유 링크(?r=...)로 열렸으면 그 결과를 바로 재현
(function(){
  const enc=new URLSearchParams(location.search).get("r");
  if(!enc) return;
  const d=Game.decodeResult(enc);
  if(d && d.name && d.v && d.v.length===6) Game.showSharedResult(d);
})();
</script>
